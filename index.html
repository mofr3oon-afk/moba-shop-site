<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MOBA SHOP | Digital Store For Gamers</title>
  <meta name="theme-color" content="#07111d">
  <link rel="icon" href="/assets/moba-shop-logo-256.png">
  <link rel="stylesheet" href="/styles/app.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="/" data-link>
      <img src="/assets/moba-shop-logo-512.webp" alt="MOBA SHOP">
      <span><b>MOBA <em>SHOP</em></b><small>Digital Store For Gamers</small></span>
    </a>
    <nav class="main-nav" aria-label="التنقل">
      <a href="/" data-link>الرئيسية</a>
      <a href="/cart" data-link>السلة</a>
      <a href="/track" data-link>طلباتي</a>
      <a href="/reviews" data-link>الآراء</a>
      <button id="openAssistant" type="button">الدعم</button>
    </nav>
  </header>

  <main id="app" class="app-shell" tabindex="-1"></main>

  <button id="cartBubble" class="cart-bubble" type="button" aria-label="فتح السلة">
    <span>السلة</span>
    <b id="cartBubbleText">0 منتجات | 0 جنيه</b>
  </button>

  <aside id="assistantPanel" class="assistant-panel" aria-hidden="true">
    <div class="assistant-head">
      <button id="closeAssistant" type="button" aria-label="إغلاق">×</button>
      <div>
        <b>فرعون Assistant</b>
        <small>مساعد الشحن والدعم والمتابعة</small>
      </div>
      <img src="/assets/assistant/pharaoh-realistic-transparent-512.webp" alt="">
    </div>
    <div id="assistantMessages" class="assistant-messages"></div>
    <form id="assistantForm" class="assistant-form">
      <input id="assistantInput" autocomplete="off" placeholder="اكتب سؤالك هنا...">
      <button type="submit">إرسال</button>
    </form>
  </aside>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
