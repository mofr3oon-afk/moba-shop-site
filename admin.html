<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MOBA SHOP Admin</title>
  <link rel="icon" href="/assets/moba-shop-logo-256.png">
  <link rel="stylesheet" href="/styles/app.css">
  <style>
    .admin-shell{width:min(1280px,calc(100% - 24px));margin:18px auto 80px}.login-screen{min-height:calc(100vh - 40px);display:grid;place-items:center}.login-card{width:min(430px,100%);border:1px solid var(--line);border-radius:26px;background:linear-gradient(145deg,#101b2b,#07101d);box-shadow:var(--shadow);padding:24px}.login-card img{width:72px;height:72px;border-radius:18px;display:block;margin:0 auto 14px;object-fit:cover}.login-card h1{text-align:center;margin:0 0 6px}.login-card p{text-align:center;color:var(--muted);margin:0 0 18px}.admin-tabs{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}.admin-tabs button{border:1px solid var(--line);border-radius:14px;background:#111b2b;color:#fff;padding:12px 16px;cursor:pointer}.admin-tabs button.active{background:#1d8cff}.admin-grid{display:grid;grid-template-columns:300px 1fr;gap:16px}.admin-list{display:grid;gap:10px}.admin-card{border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.04);padding:12px}.row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:10px 0}.admin-actions{display:flex;gap:8px;flex-wrap:wrap}.mini{padding:8px 10px;border-radius:10px;border:1px solid var(--line);background:#182436;color:#fff;cursor:pointer}.orders-list{display:grid;gap:12px}.order-card{border:1px solid var(--line);border-radius:18px;background:#111b2a;padding:14px}.order-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.order-actions button{padding:10px 12px;border:0;border-radius:12px;color:#fff;cursor:pointer}.st-pending{background:#60708a}.st-claimed{background:#1e8cff}.st-processing{background:#9b7cff}.st-delivered{background:#22bd75}.st-needs_fix{background:#ff6b87}.st-cancelled{background:#4b5565}.st-archived{background:#2d3441}.image-preview{width:76px;height:76px;border-radius:14px;object-fit:cover;border:1px solid var(--line);background:#07111e}.upload-line{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    @media(max-width:760px){
      .admin-shell{width:calc(100% - 8px);margin:6px auto 72px}
      .login-screen{min-height:calc(100vh - 12px)}
      .login-card{padding:16px;border-radius:18px}
      .login-card img{width:58px;height:58px}.login-card h1{font-size:22px}
      .admin-grid,.row{grid-template-columns:1fr!important;gap:8px}
      .admin-tabs{gap:6px;overflow:auto;flex-wrap:nowrap;margin:8px 0 10px;padding-bottom:6px}
      .admin-tabs button{flex:0 0 auto;min-width:92px;padding:9px 10px;border-radius:12px;font-size:12px}
      .admin-card,.order-card{padding:10px;border-radius:14px}
      .admin-actions{gap:6px}
      .mini,.order-actions button{padding:8px 9px;font-size:12px;border-radius:10px}
      .order-actions{gap:6px}
      .image-preview{width:58px;height:58px}
      .upload-line{gap:7px}
    }
  </style>
</head>
<body>
  <main class="admin-shell">
    <section id="loginBox" class="login-screen">
      <div class="login-card">
        <img src="/assets/moba-shop-logo.png" alt="" onerror="this.src='/assets/moba-shop-logo-512.webp'">
        <h1>MOBA SHOP Admin</h1>
        <p>سجل الدخول لفتح لوحة التحكم</p>
        <div id="credentialsStep">
          <div class="field"><label>Username</label><input id="adminUsername" autocomplete="username" placeholder="اسم المستخدم"></div>
          <div class="field"><label>Password</label><input id="adminPassword" type="password" autocomplete="current-password" placeholder="كلمة المرور"></div>
          <label style="display:flex;gap:8px;align-items:center;margin-top:10px"><input id="trustAdminDevice" type="checkbox" checked> اعتبر الجهاز ده موثوق لنهاية اليوم</label>
          <button class="primary" id="loginBtn" style="width:100%;margin-top:12px">دخول</button>
        </div>
        <div id="otpStep" hidden>
          <div class="message ok">تم إرسال كود التحقق على تليجرام.</div>
          <div class="field"><label>كود التحقق</label><input id="adminOtp" inputmode="numeric" placeholder="اكتب الكود"></div>
          <button class="primary success" id="otpBtn" style="width:100%;margin-top:12px">تأكيد الكود</button>
        </div>
      </div>
    </section>
    <div id="adminContent" hidden>
      <section class="section">
        <div class="page-title">
          <div><h1>لوحة التحكم</h1><p>إدارة الطلبات والأقسام والعروض والبراند.</p></div>
          <div class="admin-actions"><button class="ghost-btn" id="logoutBtn" type="button">Logout</button><a class="ghost-btn" href="/">فتح الموقع</a></div>
        </div>
      </section>
      <div class="admin-tabs">
        <button class="active" data-tab="orders">الطلبات</button>
        <button data-tab="catalog">إدارة الأقسام</button>
        <button data-tab="offers">العروض</button>
        <button data-tab="brand">البراند</button>
        <button data-tab="coupons">الكوبونات</button>
        <button data-tab="reviews">الآراء</button>
        <button data-tab="security">الأمان والحظر</button>
        <button data-tab="reports">التقارير</button>
        <button data-tab="archive">الأرشيف</button>
        <button data-tab="visitors">الزوار</button>
        <button data-tab="payments">بيانات الدفع</button>
        <button data-tab="health">صحة الموقع</button>
        <button data-tab="adminlog">Admin Login</button>
      </div>
      <section id="adminView" class="section"></section>
    </div>
  </main>
  <script type="module" src="/js/admin.js"></script>
</body>
</html>
