<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>MOBA SHOP Admin</title>
  <link rel="icon" href="/assets/moba-shop-logo-256.png">
  <link rel="stylesheet" href="/styles/app.css">
  <style>
    .admin-shell{width:min(1280px,calc(100% - 24px));margin:18px auto 80px}.admin-tabs{display:flex;gap:8px;flex-wrap:wrap;margin:16px 0}.admin-tabs button{border:1px solid var(--line);border-radius:14px;background:#111b2b;color:#fff;padding:12px 16px;cursor:pointer}.admin-tabs button.active{background:#1d8cff}.admin-grid{display:grid;grid-template-columns:300px 1fr;gap:16px}.admin-list{display:grid;gap:10px}.admin-card{border:1px solid var(--line);border-radius:16px;background:rgba(255,255,255,.04);padding:12px}.row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:10px 0}.admin-actions{display:flex;gap:8px;flex-wrap:wrap}.mini{padding:8px 10px;border-radius:10px;border:1px solid var(--line);background:#182436;color:#fff;cursor:pointer}.orders-list{display:grid;gap:12px}.order-card{border:1px solid var(--line);border-radius:18px;background:#111b2a;padding:14px}.order-actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.order-actions button{padding:10px 12px;border:0;border-radius:12px;color:#fff;cursor:pointer}.st-pending{background:#60708a}.st-claimed{background:#1e8cff}.st-processing{background:#9b7cff}.st-delivered{background:#22bd75}.st-needs_fix{background:#ff6b87}.st-cancelled{background:#4b5565}.st-archived{background:#2d3441}
    @media(max-width:760px){.admin-grid,.row{grid-template-columns:1fr}.admin-shell{width:calc(100% - 12px)}}
  </style>
</head>
<body>
  <main class="admin-shell">
    <section class="section">
      <div class="page-title">
        <div><h1>MOBA SHOP Admin</h1><p>إدارة الطلبات، الأقسام، المنتجات والعروض.</p></div>
        <a class="ghost-btn" href="/">فتح الموقع</a>
      </div>
      <div id="loginBox" class="fields-grid" style="margin-top:12px">
        <div class="field"><label>مفتاح الأدمن</label><input id="adminSecret" type="password" placeholder="اكتب مفتاح الدخول"></div>
        <button class="primary" id="loginBtn">دخول</button>
      </div>
    </section>
    <div id="adminContent" hidden>
      <div class="admin-tabs">
        <button class="active" data-tab="orders">الطلبات</button>
        <button data-tab="catalog">إدارة الأقسام</button>
        <button data-tab="offers">العروض</button>
      </div>
      <section id="adminView" class="section"></section>
    </div>
  </main>
  <script type="module" src="/js/admin.js"></script>
</body>
</html>
